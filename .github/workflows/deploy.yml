name: Deploy CloudCostEnv

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  ENABLE_RAILWAY_DEPLOY: "true"
  ENABLE_VERCEL_DEPLOY: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rl-quality-gate:
    name: RL Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Enforce RL Quality Thresholds
        run: |
          python -m cloud_cost_env.rl.quality_gate \
            --policy cloud_cost_env/data/rl/q_policy_v1.json \
            --episodes 180 \
            --seed 9103 \
            --min-mean-reward 0.87 \
            --min-mean-score 0.121 \
            --min-success-rate 0.87 \
            --max-score-gap-vs-heuristic 0.008 \
            --max-success-gap-vs-heuristic 0.02 \
            --max-score-gap-vs-baseline 0.0

  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: rl-quality-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deployment Disabled Notice
        if: env.ENABLE_RAILWAY_DEPLOY != 'true'
        run: echo "Railway deployment is disabled. Set ENABLE_RAILWAY_DEPLOY to true to enable."

      - name: Deploy Backend
        if: env.ENABLE_RAILWAY_DEPLOY == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          export RAILWAY_TOKEN="$(echo "$RAILWAY_TOKEN" | tr -d '\r\n')"
          railway up --ci \
            --project "${{ vars.RAILWAY_PROJECT_ID }}" \
            --environment "production" \
            --service "${{ vars.RAILWAY_SERVICE_NAME }}"

      - name: Smoke Test Backend Health
        if: env.ENABLE_RAILWAY_DEPLOY == 'true'
        run: |
          HEALTH_URL="https://cloud-cost-env-api-production.up.railway.app/health"
          echo "Running backend smoke test against: ${HEALTH_URL}"

          for attempt in {1..10}; do
            response="$(curl --silent --show-error --fail "$HEALTH_URL" || true)"
            if echo "$response" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
              echo "Smoke test passed: ${response}"
              exit 0
            fi

            echo "Attempt ${attempt}/10 failed. Waiting 8 seconds before retry."
            sleep 8
          done

          echo "Smoke test failed after 10 attempts."
          exit 1

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: vars.VERCEL_ORG_ID != '' && vars.VERCEL_PROJECT_ID != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Build and Deploy Frontend
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          export VERCEL_TOKEN="$(echo "$VERCEL_TOKEN" | tr -d '\r\n')"
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Skipping frontend deploy because VERCEL_TOKEN is not configured."
            exit 0
          fi

          # Deploy from a detached temp copy and clear git/CI metadata env vars
          # so Vercel does not reject deploys due commit-author team restrictions.
          TMP_DIR="$(mktemp -d)"
          tar -cf - . | (cd "$TMP_DIR" && tar -xf -)
          cd "$TMP_DIR"

          unset GITHUB_ACTIONS GITHUB_SHA GITHUB_REF GITHUB_REF_NAME GITHUB_REPOSITORY
          unset GITHUB_HEAD_REF GITHUB_BASE_REF GITHUB_ACTOR GITHUB_WORKFLOW GITHUB_RUN_ID

          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
