name: Deploy CloudCostEnv

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  ENABLE_RAILWAY_DEPLOY: "true"

jobs:
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deployment Disabled Notice
        if: env.ENABLE_RAILWAY_DEPLOY != 'true'
        run: echo "Railway deployment is disabled. Set ENABLE_RAILWAY_DEPLOY to true to enable."

      - name: Deploy Backend
        if: env.ENABLE_RAILWAY_DEPLOY == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: >-
          railway up --ci
          --project "${{ vars.RAILWAY_PROJECT_ID }}"
          --environment "production"
          --service "${{ vars.RAILWAY_SERVICE_NAME }}"
