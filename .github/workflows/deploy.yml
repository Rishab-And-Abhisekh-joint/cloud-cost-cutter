name: Deploy CloudCostEnv

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  ENABLE_RAILWAY_DEPLOY: "true"
  ENABLE_VERCEL_DEPLOY: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deployment Disabled Notice
        if: env.ENABLE_RAILWAY_DEPLOY != 'true'
        run: echo "Railway deployment is disabled. Set ENABLE_RAILWAY_DEPLOY to true to enable."

      - name: Deploy Backend
        if: env.ENABLE_RAILWAY_DEPLOY == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          export RAILWAY_TOKEN="$(echo "$RAILWAY_TOKEN" | tr -d '\r\n')"
          railway up --ci \
            --project "${{ vars.RAILWAY_PROJECT_ID }}" \
            --environment "production" \
            --service "${{ vars.RAILWAY_SERVICE_NAME }}"

      - name: Smoke Test Backend Health
        if: env.ENABLE_RAILWAY_DEPLOY == 'true'
        run: |
          HEALTH_URL="https://cloud-cost-env-api-production.up.railway.app/health"
          echo "Running backend smoke test against: ${HEALTH_URL}"

          for attempt in {1..10}; do
            response="$(curl --silent --show-error --fail "$HEALTH_URL" || true)"
            if echo "$response" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
              echo "Smoke test passed: ${response}"
              exit 0
            fi

            echo "Attempt ${attempt}/10 failed. Waiting 8 seconds before retry."
            sleep 8
          done

          echo "Smoke test failed after 10 attempts."
          exit 1

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: vars.VERCEL_ORG_ID != '' && vars.VERCEL_PROJECT_ID != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Build and Deploy Frontend
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_GIT_AUTHOR_NAME: ${{ vars.VERCEL_GIT_AUTHOR_NAME }}
          VERCEL_GIT_AUTHOR_EMAIL: ${{ vars.VERCEL_GIT_AUTHOR_EMAIL }}
        run: |
          export VERCEL_TOKEN="$(echo "$VERCEL_TOKEN" | tr -d '\r\n')"
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Skipping frontend deploy because VERCEL_TOKEN is not configured."
            exit 0
          fi

          AUTHOR_NAME="${VERCEL_GIT_AUTHOR_NAME:-rishabacharjee12345-8435}"
          AUTHOR_EMAIL="${VERCEL_GIT_AUTHOR_EMAIL:-rishab.acharjee12345@gmail.com}"

          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" \
            -m "gitCommitAuthorName=${AUTHOR_NAME}" \
            -m "gitCommitAuthorEmail=${AUTHOR_EMAIL}" \
            -m "gitCommitRef=${GITHUB_REF_NAME}" \
            -m "gitCommitSha=${GITHUB_SHA}" \
            -m "gitCommitMessage=Deploy via GitHub Actions"
